[tool.mypy]
plugins = ["pydantic.mypy"]
python_version = "3.14"
strict = true
warn_unreachable = true

[tool.pytest]
addopts = ["-q", "-ra"]
asyncio_default_fixture_loop_scope = "function"
asyncio_mode = "auto"
minversion = "9.0"
required_plugins = ["pytest-asyncio~=1.3.0"]
strict = true
testpaths = ["tests"]

[tool.ruff]
line-length = 79
target-version = "py314"

[tool.ruff.lint]
ignore = ["COM812"] # may conflict with the Ruff formatter
select = [
  "A", # flake8-builtins
  "ANN", # flake8-annotations
  "ARG", # flake8-unused-arguments
  "ASYNC", # flake8-async
  "B", # flake8-bugbear
  "C4", # flake8-comprehensions
  "COM", # flake8-commas
  "D", # pydocstyle
  "DTZ", # flake8-datetimez
  "E", # pycodestyle error
  "EM", # flake8-errmsg
  "F", # Pyflakes
  "FAST", # FastAPI
  "FBT", # flake8-boolean-trap
  "FURB", # refurb
  "G", # flake8-logging-format
  "I", # isort
  "ICN", # flake8-import-conventions
  "INP", # flake8-no-pep420
  "LOG", # flake8-logging
  "N", # pep8-naming
  "PIE", # flake8-pie
  "PL", # Pylint
  "PT", # flake8-pytest-style
  "RET", # flake8-return
  "RUF", # Ruff-specific rules
  "S", # flake8-bandit
  "SIM", # flake8-simplify
  "SLF", # flake8-self
  "T20", # flake8-print
  "TC", # flake8-type-checking
  "TID", # flake8-tidy-imports
  "TRY", # tryceratops
  "UP", # pyupgrade
  "W" # pycodestyle warning
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D", "S101"]

[tool.ruff.lint.pycodestyle]
max-doc-length = 72

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.tomlsort]
all = true
in_place = true
