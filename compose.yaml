x-app-defaults: &app-defaults
  image: fastapi-sqlalchemy-app
  build: .
  env_file: .env
  volumes:
    - .:/app

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=app_db
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./tests/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.29
    restart: unless-stopped
    ports:
      - "8025:8025"

  migrator:
    <<: *app-defaults
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy

  api:
    <<: *app-defaults
    command: fastapi dev app/main.py --host 0.0.0.0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  worker:
    <<: *app-defaults
    command: watchfiles "celery -A app.celery.celery_app worker -c 1" app
    depends_on:
      redis:
        condition: service_healthy

  flower:
    <<: *app-defaults
    command: celery -A app.celery.celery_app flower
    ports:
      - "5555:5555"
    environment:
      - FLOWER_PERSISTENT=true
      - FLOWER_DB=/data/flower_db
      - FLOWER_MAX_TASKS=1000
    volumes:
      - .:/app
      - flower-data:/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  flower-data:
